<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVNova Fixed Version</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f3f6fb;
margin:0;
padding:0;
}

#cvo{
width:210mm;
min-height:297mm;
margin:auto;
background:white;
padding:25mm;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.ar{
font-family:'Amiri',serif;
direction:rtl;
}

#cvo *{
page-break-inside:avoid !important;
}

button{
padding:12px 22px;
border:none;
border-radius:8px;
background:#2355e8;
color:white;
font-weight:600;
cursor:pointer;
margin:20px;
}
</style>

</head>

<body>

<div style="text-align:center">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="cvo">
<h1 id="name">Your Name</h1>
<p id="job">Job Title</p>
<hr>

<h2>Profile</h2>
<p>Lorem ipsum professional summary text example.</p>

<h2>Experience</h2>
<p>Company — Position — 2022‑2025</p>

<h2>Education</h2>
<p>University Name — Degree</p>

<h2>Skills</h2>
<p>HTML · CSS · JavaScript</p>

</div>

<script>
function downloadPDF(){

const element = document.getElementById("cvo");

const opt = {
margin:[0,0,0,0],
filename:"cv.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{
scale:2,
useCORS:true,
letterRendering:true
},
jsPDF:{
unit:"mm",
format:"a4",
orientation:"portrait"
},
pagebreak:{mode:['avoid-all']}
};

html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
